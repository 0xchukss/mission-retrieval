        <script>
            function startGame(){
                
                var stats;

                stats = new Stats();

                // Align top-left
                stats.domElement.style.position = 'absolute';
                stats.domElement.style.left = '0px';
                stats.domElement.style.top = '0px';

                if (GTA.Experience && GTA.Experience.isPhoneMode()) {
                    stats.domElement.style.display = 'none';
                }

                document.body.appendChild( stats.domElement );

                setInterval( function () {

                    stats.update();

                }, 1000 / 60 );
                
                
                var game = new GTA.Game();
            }

            function boot(){
                GTA.Experience.boot(startGame);
            }
            
        </script>
        <style>
            body, html {
                overflow:hidden;
                margin:0;
                padding:0;
                background:#000;
                width:100%;
                height:100%;
            }

            canvas {
                display:block;
            }

            #GTADebugPositionData {




                position: absolute;
                right: 0px;
                top: 0px;
                width: 200px;
                height: 50px;
                opacity: 0.5;
                color: #fff;
